<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PROJECT_NAME | Devin Caulfield</title>
    <link rel="stylesheet" href="../../assets/css/style.css" />
  </head>
  <body>
    <div data-include="header"></div>

    <main>
      <!-- PROJECT CARD WITH EXPERIENCE/EDUCATION SIDEBAR -->
      <section class="project-metadata-section">
        <div class="site-container">
          <div class="project-metadata-layout">
            <!-- PROJECT CARD -->
            <div class="project-metadata-card">
              <div
                data-include-path="card.html"
                data-rewrite-project-paths="true"
              ></div>
            </div>

            <!-- EXPERIENCE/EDUCATION CARD (Right-justified) -->
            <div class="project-experience-card">
              <!-- EXPERIENCE_CARD_CONTENT -->
            </div>
          </div>
        </div>
      </section>

      <!-- PROJECT DETAILS WITH BLOG-STYLE LAYOUT -->
      <section class="article-section">
        <div class="site-container">
          <article class="article-content">
            <h2>Overview</h2>
            <p>PROJECT_OVERVIEW</p>

            <!-- BLOG SECTION WITH TEXT AND IMAGE -->
            <div class="blog-row">
              <div class="blog-text">
                <h2>Problem Statement</h2>
                <p>PROJECT_PROBLEM</p>
              </div>
              <div class="blog-image">
                <img src="images/BLOG_IMAGE_1.jpg" alt="Problem context" />
              </div>
            </div>

            <div class="blog-row blog-row-reverse">
              <div class="blog-text">
                <h2>Solution & Approach</h2>
                <p>PROJECT_SOLUTION</p>
              </div>
              <div class="blog-image">
                <img
                  src="images/BLOG_IMAGE_2.jpg"
                  alt="Solution implementation"
                />
              </div>
            </div>

            <div class="blog-row">
              <div class="blog-text">
                <h2>Results & Outcomes</h2>
                <p>PROJECT_RESULTS</p>
              </div>
              <div class="blog-image">
                <img src="images/BLOG_IMAGE_3.jpg" alt="Project results" />
              </div>
            </div>

            <h2>Key Learnings</h2>
            <p>PROJECT_LEARNINGS</p>
          </article>
        </div>
      </section>

      <!-- EXPLORE OTHER PROJECTS -->
      <section class="explore-projects-section">
        <div class="site-container">
          <h2>
            <a href="../../index.html#portfolio">Explore Other Projects</a>
          </h2>
          <div class="explore-projects-grid" id="explore-projects-grid">
            <!-- PROJECT CARDS LOADED HERE -->
          </div>
        </div>
      </section>
    </main>

    <div data-include="footer"></div>

    <script src="../../assets/js/include-components.js"></script>
    <script src="../../assets/js/project-navigation.js"></script>
  </body>
</html>
